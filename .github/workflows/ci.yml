name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      tags:
        description: Tag expression to run in the example integration suite
        required: false
        default: '@smoke'

jobs:
  package-checks:
    name: Package Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install package dependencies
        run: flutter pub get

      - name: Analyze package
        run: dart analyze .

      - name: Run package tests
        run: flutter test

  example-integration:
    name: Example Integration
    runs-on: ubuntu-latest
    needs: package-checks
    env:
      BDD_TAGS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tags || '@smoke' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config \
            xvfb

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install package dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Run generated integration suite from feature files
        working-directory: example
        run: |
          xvfb-run -a dart run flutter_bdd_suite:cli \
            --config integration_test/test_config.dart \
            --tags "$BDD_TAGS" \
            -- \
            -d linux \
            --coverage

      - name: Upload Cucumber JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-json-report
          path: example/report/report.json
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: example-coverage
          path: example/coverage/lcov.info
          if-no-files-found: warn

      - name: Upload generated integration files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-integration-tests
          path: |
            example/integration_test/all_integration_tests.dart
            example/integration_test/generated
          if-no-files-found: warn
